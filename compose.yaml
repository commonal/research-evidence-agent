services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: research_evidence
      POSTGRES_USER: research
      POSTGRES_PASSWORD: research
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U research -d research_evidence"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  postgres_data:
